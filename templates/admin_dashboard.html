<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberShield Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex flex-col">

    <nav class="bg-slate-800 border-b border-slate-700 p-4 shadow-md flex justify-between">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-shield-cat text-blue-500 text-2xl"></i>
            <h1 class="text-xl font-bold tracking-wider">CYBERSHIELD <span class="text-blue-500">ADMIN</span></h1>
        </div>
        <div class="flex gap-4 text-sm">
            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> DB: Connected</div>
            <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> AI: Active</div>
        </div>
    </nav>

    <div class="flex-1 p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 overflow-hidden">

        <div class="bg-slate-800 rounded-xl border border-slate-700 flex flex-col shadow-lg">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h2 class="text-lg font-bold text-blue-400"><i class="fa-solid fa-server mr-2"></i> Network Traffic</h2>
                <span id="net-status" class="bg-green-900 text-green-300 px-2 py-1 rounded text-xs font-bold">NORMAL</span>
            </div>
            
            <div class="flex-1 p-4 relative">
                <canvas id="trafficChart"></canvas>
            </div>
            
            <div class="p-4 grid grid-cols-2 gap-4 border-t border-slate-700 bg-slate-800/50">
                <div class="text-center">
                    <p class="text-slate-500 text-xs uppercase">Current Load</p>
                    <p class="text-2xl font-bold text-white"><span id="rps-val">0</span> <span class="text-sm font-normal text-slate-400">req/sec</span></p>
                </div>
                <div class="text-center">
                    <p class="text-slate-500 text-xs uppercase">Last Alert</p>
                    <p class="text-sm font-bold text-red-400 truncate px-2" id="last-alert">None</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 flex flex-col shadow-lg">
            <div class="p-4 border-b border-slate-700 bg-slate-800/50">
                <h2 class="text-lg font-bold text-purple-400"><i class="fa-solid fa-user-shield mr-2"></i> User Violations</h2>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col">
                <div class="grid grid-cols-3 bg-slate-700/30 p-2 text-xs text-slate-400 font-bold uppercase">
                    <div>User</div>
                    <div class="text-center">Offenses</div>
                    <div class="text-right">Status</div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-2 space-y-2" id="user-list">
                    </div>
            </div>

            <div class="h-32 border-t border-slate-700 bg-slate-900/50 p-3 overflow-y-auto">
                <p class="text-xs text-slate-500 font-bold mb-2 uppercase">Live Incident Log</p>
                <ul id="incident-log" class="space-y-1 text-xs font-mono text-slate-400">
                    </ul>
            </div>
        </div>
    </div>

    <script>
        // --- 1. NETWORK CHART ---
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'Traffic Volume',
                    data: Array(20).fill(0),
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#334155' } }, 
                    x: { display: false } 
                },
                animation: false
            }
        });

        // --- 2. DATA FETCHER ---
        async function updateDashboard() {
            // A. Update Network
            try {
                const res = await fetch('/api/admin_dashboard/network');
                const data = await res.json();
                
                // Chart Update
                const currentData = chart.data.datasets[0].data;
                currentData.shift();
                currentData.push(data.rps);
                chart.update();

                // Text Update
                document.getElementById('rps-val').innerText = data.rps;
                
                // Alert Status
                const badge = document.getElementById('net-status');
                if (data.rps > 50) {
                    badge.innerText = "UNDER ATTACK";
                    badge.className = "bg-red-600 text-white px-2 py-1 rounded text-xs font-bold animate-pulse";
                    chart.data.datasets[0].borderColor = '#ef4444';
                } else {
                    badge.innerText = "NORMAL";
                    badge.className = "bg-green-900 text-green-300 px-2 py-1 rounded text-xs font-bold";
                    chart.data.datasets[0].borderColor = '#3b82f6';
                }

                if(data.latest_alert) document.getElementById('last-alert').innerText = data.latest_alert;

            } catch (e) { console.error(e); }

            // B. Update Cyberbullying
            try {
                const res = await fetch('/api/admin_dashboard/bullying');
                const data = await res.json();

                // User List
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                
                // Get the exact current time right now
                const now = new Date();

                data.offenders.forEach(u => {
                    let status = '<span class="text-green-500 font-bold">ACTIVE</span>';

                    // Check if they have a lockout timestamp
                    if (u.lockout_until) {
                        // Convert the database timestamp into a real JavaScript Date object
                        const lockoutDate = new Date(u.lockout_until);
                        
                        // If that lockout date is still in the future, keep them locked!
                        if (lockoutDate > now) {
                            status = '<span class="text-red-500 font-bold">LOCKED</span>';
                        }
                    }

                    list.innerHTML += `
                        <div class="grid grid-cols-3 p-2 bg-slate-700/20 rounded border border-slate-700 items-center">
                            <div class="font-bold text-slate-200">${u.username}</div>
                            <div class="text-center font-mono text-purple-400">${u.offense_count}</div>
                            <div class="text-right text-xs">${status}</div>
                        </div>`;
                });

                // Incident Log
                const log = document.getElementById('incident-log');
                log.innerHTML = '';
                data.incidents.forEach(i => {
                    log.innerHTML += `<li><span class="text-purple-400">[${i.category}]</span> ${i.username}: "${i.message}"</li>`;
                });

            } catch (e) { console.error(e); }
        }

        setInterval(updateDashboard, 1000);
    </script>
</body>
</html>
