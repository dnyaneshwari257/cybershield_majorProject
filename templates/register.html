<!-- templates/register.html -->
{% extends "base.html" %}

{% block title %}Register - EduLearn{% endblock %}

{% block content %}
<nav class="navbar">
    <a href="{{ url_for('index') }}" class="navbar-brand">
        <i class="fas fa-graduation-cap"></i> EduLearn
    </a>
</nav>

<div class="container" style="margin-top: 50px;">
    <div style="max-width: 500px; margin: 0 auto;">
        <div class="card">
            <div class="card-body">
                <div class="page-header">
                    <h2 class="page-title">
                        <i class="fas fa-user-plus"></i> Create Account
                    </h2>
                    <p class="page-subtitle">Join our learning community today!</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-user"></i> Full Name
                        </label>
                        <input type="text" name="full_name" class="form-input" required 
                               placeholder="Enter your full name" autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" name="email" class="form-input" required 
                               placeholder="your.email@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-phone"></i> Phone Number
                        </label>
                        <input type="tel" name="phone" class="form-input" required 
                               placeholder="+1 (555) 123-4567" autocomplete="tel">
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-book"></i> Course of Interest
                        </label>
                        <select name="course" class="form-input form-select" required>
                            <option value="">Select your course</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Data Science">Data Science</option>
                            <option value="Web Development">Web Development</option>
                            <option value="Digital Marketing">Digital Marketing</option>
                            <option value="Graphic Design">Graphic Design</option>
                            <option value="Business Administration">Business Administration</option>
                            <option value="Cybersecurity">Cybersecurity</option>
                            <option value="Mobile App Development">Mobile App Development</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <i class="fas fa-rocket"></i> Create My Account
                    </button>
                </form>

                <div class="form-divider">
                    <p>Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-secondary">
                        <i class="fas fa-sign-in-alt"></i> Login Here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
