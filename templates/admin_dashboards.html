{% extends "admin_base.html" %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}

<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- NETWORK GRAPH -->

<div class="bg-slate-800 rounded-xl border border-slate-700 p-5">

<h2 class="text-lg font-bold text-blue-400 mb-4">
<i class="fa-solid fa-server mr-2"></i>Network Traffic
</h2>

<canvas id="trafficChart"></canvas>

<div class="grid grid-cols-2 gap-4 mt-4">

<div>
<p class="text-xs text-slate-400">Current Load</p>
<p class="text-2xl font-bold">
<span id="rps">0</span> req/sec
</p>
</div>

<div>
<p class="text-xs text-slate-400">Last Alert</p>
<p id="lastAlert" class="text-red-400 font-bold">None</p>
</div>

</div>

</div>

<!-- THREAT DETAILS -->

<div class="bg-slate-800 rounded-xl border border-slate-700 p-5">

<h2 class="text-lg font-bold text-red-400 mb-4">
<i class="fa-solid fa-triangle-exclamation mr-2"></i>Threat Detected
</h2>

<div id="threat-feed" class="space-y-3 text-sm">

<p class="text-slate-400">No threats detected</p>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>



const ctx = document.getElementById("trafficChart").getContext("2d")

const chart = new Chart(ctx,{
type:"line",
data:{
labels:Array(20).fill(""),
datasets:[{
data:Array(20).fill(0),
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
animation:false
}
})

function updateThreatFeed(attacks){

const container = document.getElementById("threat-feed");

container.innerHTML = "";

if(!attacks || attacks.length === 0){

container.innerHTML = "<p class='text-slate-400'>No threats detected</p>";
return;

}

attacks.forEach(a => {

container.innerHTML += `
<div class="bg-slate-900 p-3 rounded-lg border border-slate-700">

<p><b>Attack:</b> ${a.attack_type}</p>
<p><b>IP:</b> ${a.ip_address}</p>
<p><b>Location:</b> ${a.location}</p>
<p><b>Severity:</b> ${a.severity}</p>
<p><b>Status:</b> ${a.blocked ? "Blocked" : "Active"}</p>
<p><b>Time:</b> ${new Date(a.timestamp).toLocaleString()}</p>

</div>
`;

});

}

async function updateDashboard(){

try{

const res = await fetch("/api/admin_dashboards/network")
const data = await res.json()


/* ---------- GRAPH UPDATE ---------- */

const arr = chart.data.datasets[0].data

arr.shift()
arr.push(data.rps)

chart.update()


/* ---------- LOAD VALUE ---------- */

document.getElementById("rps").innerText = data.rps

if(data.rps > 50){
chart.data.datasets[0].borderColor="#ef4444"
}else{
chart.data.datasets[0].borderColor="#3b82f6"
}


/* ---------- LAST ALERT ---------- */

if(data.latest_alert){
document.getElementById("lastAlert").innerText = data.latest_alert
}


/* ---------- THREAT PANEL ---------- */

updateThreatFeed(data.attacks)

}catch(e){

console.error(e)

}

}

/* ---------- REAL TIME REFRESH ---------- */

setInterval(updateDashboard,1000)

</script>


{% endblock %}
